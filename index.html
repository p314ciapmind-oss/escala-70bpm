<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Escala 70º BPM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="tela-login" class="centro">
    <div class="cartao">
      <h2>Escala 70º BPM</h2>
      <p>Entre com sua conta Google para acessar.</p>
      <button id="btn-entrar" class="google">Entrar com Google</button>
      <p id="mensagem-erro" class="erro"></p>
    </div>
  </div>

  <div id="tela-app" class="escondido">
    <header>
      <div class="barra-usuario">
        <span id="info-usuario"></span>
        <button id="btn-sair" class="sair">Sair</button>
      </div>
      <h1>Escala 70º BPM</h1>
      <p>Militares sincronizados da planilha da P4/RH.</p>
    </header>
    <main>
      <div class="painel-militares">
        <input type="text" id="busca-militar" placeholder="Buscar por nome, matrícula, posto/graduação ou unidade..." />
        <p id="status-militares" class="status"></p>
        <div class="tabela-scroll">
          <table>
            <thead>
              <tr>
                <th>Matrícula</th>
                <th>Nome</th>
                <th>Posto/Graduação</th>
                <th>Unidade</th>
                <th>Situação</th>
              </tr>
            </thead>
            <tbody id="corpo-tabela-militares"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
